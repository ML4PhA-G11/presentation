name: Deploy slides to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The site is plain static HTML: index.html (landing page) + talk.html (the
      # reveal.js deck), which pulls reveal.js, MathJax and the chalkboard plugin
      # from a CDN — no build step. We just stage the files + assets and publish.
      - name: Stage static site
        run: |
          mkdir -p _site
          cp index.html talk.html _site/
          cp -r assets _site/assets
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
