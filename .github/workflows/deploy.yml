name: Deploy slides to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The site is plain static HTML: index.html (landing page) + talk.html (the
      # reveal.js deck), which pulls reveal.js, MathJax and the chalkboard plugin
      # from a CDN — no build step. We just stage the files + assets and publish.
      - name: Stage static site
        run: |
          mkdir -p _site
          cp index.html talk.html _site/
          cp -r assets _site/assets
          touch _site/.nojekyll

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Render the reveal.js deck to talk.pdf (the landing page's "PDF" link)
      # with decktape, so the downloadable PDF always matches the live deck.
      - name: Render deck to PDF
        run: |
          python3 -m http.server 8080 --directory _site >/dev/null 2>&1 &
          sleep 2
          npx --yes decktape reveal --size 1214x700 \
            "http://localhost:8080/talk.html" _site/talk.pdf

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
