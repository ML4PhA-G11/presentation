<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Learning the Lattice Boltzmann Collision Operator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/white.css">
<style>
  #bg-canvas { display: none; }
  .reveal .slides section {
    background: #ffffff;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    padding: 30px 40px;
    box-sizing: border-box;
    height: 700px !important;
  }
  .reveal { font-family: 'Inter', sans-serif; font-weight: 400; }
  .reveal h1, .reveal h2, .reveal h3 { color: #2c3e50; font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
  .reveal h2 { font-size: 1.2em; margin-bottom: 0.3em; text-align: left; }
  .reveal .cols h3 { font-size: 0.95em; }
  .reveal .subtitle { font-size: 0.6em; color: #7f8c8d; margin-top: 0.5em; }
  .reveal section { font-size: 0.66em; }
  .reveal p { margin: 0.3em 0; }
  .reveal ul, .reveal ol { text-align: left; margin: 0.3em 0; }
  .reveal li { margin: 0.15em 0; }
  .reveal .highlight { color: #e74c3c; font-weight: bold; }
  .reveal .muted { color: #7f8c8d; }
  .reveal .MathJax { font-size: 0.95em; }
  .reveal .box {
    background: #ecf0f1; border-radius: 10px; padding: 12px 16px;
    margin: 10px 0; text-align: left;
  }
  .reveal table { font-size: 0.9em; }
  .reveal pre { box-shadow: none; width: 100%; }
  .reveal pre code { padding: 10px 14px; border-radius: 8px; max-height: none; }
  .reveal .cols { display: flex; gap: 22px; align-items: flex-start; }
  .reveal .cols > div { flex: 1; }
  .reveal .cap { font-size: 0.8em; color: #95a5a6; margin-top: 4px; }
  .reveal .flow { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .reveal .flow .node {
    background: #ecf0f1; border: 1px solid #d0d7d9; border-radius: 8px;
    padding: 6px 12px; font-size: 0.85em; text-align: center;
  }
  .reveal .flow .arrow { color: #95a5a6; font-size: 1.1em; line-height: 0.6; }
  /* per-slide helpers set via Markdown `<!-- .slide: class="..." -->` */
  .reveal section.tc h1, .reveal section.tc h2, .reveal section.tc h3, .reveal section.tc > p { text-align: center; }
  .reveal section.title h1 { font-size: 1.5em; }
  .reveal section.thanks h1 { font-size: 1.3em; }
  .slide-footer {
    position: absolute;
    bottom: 8px;
    left: 40px;
    right: 40px;
    font-size: 10px;
    color: #bdc3c7;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="reveal">
<div class="slides">
  <!-- All slide content lives in talk.md (Markdown). Edit that file, not this shell. -->
  <section
    data-markdown="talk.md"
    data-separator="\r?\n---\r?\n"
    data-separator-notes="^Note:">
  </section>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/math/math.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js-plugins@latest/chalkboard/plugin.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/monokai.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js-plugins@latest/chalkboard/style.css">
<script>
Reveal.initialize({
  hash: true,
  center: false,
  transition: 'fade',
  slideNumber: true,
  width: 1214,
  height: 700,
  margin: 0.04,
  minScale: 0.2,
  maxScale: 2.0,
  // Markdown eats \( \) delimiters, so author math with $ … $ / $$ … $$.
  mathjax3: {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    }
  },
  plugins: [ RevealMarkdown, RevealMath.MathJax3, RevealHighlight, RevealNotes, RevealChalkboard ]
}).then(function () {
  // Markdown slides are built during init; add the footer once they exist.
  document.querySelectorAll('.reveal .slides > section').forEach(function (slide) {
    const footer = document.createElement('div');
    footer.className = 'slide-footer';
    footer.innerHTML = '<a href="index.html" style="color:#bdc3c7; text-decoration:none; pointer-events:auto;">&larr; Index</a>'
      + '<span>ML4PhA 2026 &mdash; Block 05 &middot; Group 11</span>'
      + '<span>arxiv:2212.06124</span>';
    slide.appendChild(footer);
  });
});
</script>
</body>
</html>
